# GSC Connect — Nginx Configuration
# Place at: /etc/nginx/sites-available/gscconnect.com

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream mcp_upstream {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name gscconnect.com app.gscconnect.com;
    return 301 https://$host$request_uri;
}

# Main app: app.gscconnect.com
server {
    listen 443 ssl http2;
    server_name app.gscconnect.com;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/app.gscconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.gscconnect.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=100r/m;

    # Apply rate limit to auth endpoints
    location ~* ^/api/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Streamable HTTP endpoint
    location /mcp {
        limit_req zone=mcp_limit burst=20 nodelay;

        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific settings
        proxy_set_header Connection '';       # Keep connection open for SSE
        proxy_buffering off;                  # Disable buffering for SSE
        proxy_cache off;                      # No caching for SSE
        proxy_read_timeout 86400s;            # 24h timeout for long SSE connections
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;

        # Allow all methods (HEAD, GET, POST)
        proxy_method $request_method;
    }

    # OAuth2 provider endpoints
    location /oauth {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth metadata discovery
    location /.well-known {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for metadata discovery
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Everything else → Next.js app
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Marketing site: gscconnect.com
server {
    listen 443 ssl http2;
    server_name gscconnect.com;

    ssl_certificate /etc/letsencrypt/live/gscconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gscconnect.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve from same Next.js app or redirect to app
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
